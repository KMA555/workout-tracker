<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BODYMAKE TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #252525;
    --accent: #f0c040;
    --text: #f0f0f0;
    --text2: #666;
    --danger: #e03030;
    --green: #1a9e6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

  /* HEADER */
  .header { padding: 52px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--accent); }
  .sync-status { font-size: 10px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  /* TABS */
  .tabs-wrap { padding: 12px 16px 0; display: flex; align-items: center; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 8px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab.active { border-color: transparent; color: #000; background: var(--accent); }
  .tab.kpi-tab.active { background: var(--accent); }
  .tab.history-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .add-tab-btn { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 1px dashed var(--border); background: none; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* SECTIONS */
  .section { display: none; padding: 16px 16px 20px; }
  .section.active { display: block; }

  /* DAY HEADER */
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 14px 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); }
  .day-header-left { flex: 1; }
  .day-title-wrap { display: flex; align-items: center; gap: 8px; }
  .day-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .edit-name-btn { background: none; border: none; color: var(--text2); font-size: 13px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .edit-name-btn:hover { color: var(--accent); }
  .day-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .day-header-right { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .icon-btn { padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }
  .icon-btn.danger { border-color: #e0303030; color: var(--danger); }

  /* EXERCISE CARD */
  .exercise-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .exercise-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .exercise-name-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
  .exercise-order { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text2); flex-shrink: 0; }
  .exercise-name { font-size: 14px; font-weight: 500; }
  .exercise-target { font-size: 11px; color: #444; margin-bottom: 12px; }
  .exercise-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .input-group label { font-size: 10px; color: var(--text2); display: block; margin-bottom: 4px; text-align: center; }
  .input-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 4px; color: var(--text); font-size: 16px; font-family: 'Noto Sans JP', sans-serif; text-align: center; -webkit-appearance: none; }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .del-ex-btn { background: none; border: none; color: #333; font-size: 16px; cursor: pointer; padding: 4px 6px; flex-shrink: 0; }
  .del-ex-btn:hover { color: var(--danger); }

  /* SAVE BTN */
  .save-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; margin-top: 16px; background: var(--accent); color: #000; transition: all 0.15s; }
  .save-btn:active { transform: scale(0.97); }
  .save-btn:disabled { opacity: 0.5; }

  /* CORE */
  .core-section { background: var(--surface); border-radius: 12px; padding: 14px; margin-top: 12px; border: 1px solid #7f77dd30; }
  .core-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: #7f77dd; letter-spacing: 2px; margin-bottom: 10px; }
  .core-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .core-item:last-child { border-bottom: none; }
  .core-item span:last-child { color: var(--accent); font-size: 11px; }

  /* KPI */
  .kpi-card { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .kpi-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; }
  .kpi-input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .kpi-input-group label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }
  .kpi-input-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 18px; text-align: center; -webkit-appearance: none; }
  .kpi-input-group input:focus { outline: none; border-color: var(--accent); }
  .kpi-save-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--surface); border-radius: 12px; padding: 16px; border: 1px solid var(--border); text-align: center; }
  .stat-label { font-size: 10px; color: var(--text2); margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; }
  .stat-value.weight { color: var(--accent); }
  .stat-value.waist { color: #5b8dd4; }
  .stat-change { font-size: 11px; margin-top: 4px; }
  .stat-change.good { color: var(--green); }
  .stat-change.bad { color: var(--danger); }
  .stat-change.neutral { color: var(--text2); }

  /* PROGRESS */
  .progress-section { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
  .progress-title { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 99px; height: 8px; margin-bottom: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text2); }

  /* HISTORY */
  .history-filter { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .history-filter::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .history-empty { text-align: center; color: var(--text2); font-size: 13px; padding: 40px 0; }
  .history-item { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .history-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .history-item-left { display: flex; align-items: center; gap: 8px; }
  .history-item-type { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; color: var(--accent); }
  .history-item-date { font-size: 11px; color: var(--text2); }
  .del-record-btn { background: none; border: 1px solid #333; border-radius: 6px; color: #444; font-size: 11px; padding: 4px 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .del-record-btn:hover { border-color: var(--danger); color: var(--danger); }
  .history-exercise { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .history-exercise:last-child { border-bottom: none; }
  .history-exercise-name { color: var(--text2); flex: 1; }
  .history-exercise-weight { color: var(--text); font-weight: 500; white-space: nowrap; }

  .section-label { font-size: 10px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; margin-top: 20px; }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: flex-end; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 44px; width: 100%; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--accent); margin-bottom: 16px; }
  .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'Noto Sans JP', sans-serif; margin-bottom: 10px; -webkit-appearance: none; }
  .modal-input:focus { outline: none; border-color: var(--accent); }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .modal-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btn { padding: 13px; border-radius: 10px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; }
  .modal-btn.cancel { background: var(--surface2); color: var(--text2); }
  .modal-btn.confirm { background: var(--accent); color: #000; }

  /* CONFIRM */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.active { display: flex; }
  .confirm-box { background: var(--surface); border-radius: 16px; padding: 24px; width: 100%; max-width: 300px; text-align: center; }
  .confirm-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
  .confirm-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
  .confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .confirm-btn { padding: 12px; border-radius: 10px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; }
  .confirm-btn.cancel { background: var(--surface2); color: var(--text2); }
  .confirm-btn.danger { background: var(--danger); color: #fff; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 24px; border-radius: 99px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">BODYMAKE</div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">クラウド接続済み</span>
  </div>
</div>

<div class="tabs-wrap" id="tabs-wrap"></div>

<div id="sections-wrap"></div>

<!-- KPI SECTION -->
<div class="section" id="section-kpi">
  <div class="section-label">今週の記録</div>
  <div class="kpi-card">
    <div class="kpi-card-title">📊 KPI入力</div>
    <div class="kpi-input-row">
      <div class="kpi-input-group"><label>体重 (kg)</label><input type="number" id="input-weight" placeholder="69.5" step="0.1" inputmode="decimal"></div>
      <div class="kpi-input-group"><label>ウエスト (cm)</label><input type="number" id="input-waist" placeholder="86" step="0.5" inputmode="decimal"></div>
    </div>
    <button class="kpi-save-btn" id="save-kpi" onclick="saveKPI()">KPIを記録する</button>
  </div>
  <div class="section-label">現在の状態</div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-label">体重</div><div class="stat-value weight" id="current-weight">--</div><div class="stat-change neutral" id="weight-change">kg</div></div>
    <div class="stat-box"><div class="stat-label">ウエスト</div><div class="stat-value waist" id="current-waist">--</div><div class="stat-change neutral" id="waist-change">cm</div></div>
  </div>
  <div class="section-label">目標進捗</div>
  <div class="progress-section">
    <div class="progress-title">体重目標：68kg（開始72kg）</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="weight-progress" style="background:var(--accent);width:0%"></div></div>
    <div class="progress-labels"><span>72kg</span><span id="weight-progress-label">0%</span><span>68kg</span></div>
  </div>
  <div class="progress-section">
    <div class="progress-title">ウエスト目標：83cm（開始89cm）</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="waist-progress" style="background:#5b8dd4;width:0%"></div></div>
    <div class="progress-labels"><span>89cm</span><span id="waist-progress-label">0%</span><span>83cm</span></div>
  </div>
  <div class="section-label">KPI履歴</div>
  <div id="kpi-history-list"></div>
</div>

<!-- HISTORY SECTION -->
<div class="section" id="section-history">
  <div class="section-label">トレーニング履歴</div>
  <div class="history-filter" id="history-filter-wrap"></div>
  <div id="history-list"></div>
</div>

<!-- ADD EXERCISE MODAL -->
<div class="modal-overlay" id="modal-ex">
  <div class="modal">
    <div class="modal-title">種目を追加</div>
    <input class="modal-input" id="modal-ex-name" placeholder="種目名（例：ダンベルフライ）" type="text">
    <input class="modal-input" id="modal-ex-target" placeholder="目標（例：12kg × 10回 × 3セット）" type="text">
    <div class="modal-row">
      <div class="input-group"><label>重量 kg</label><input type="number" id="modal-ex-kg" value="10" step="0.5" inputmode="decimal"></div>
      <div class="input-group"><label>回数</label><input type="number" id="modal-ex-reps" value="10" inputmode="numeric"></div>
      <div class="input-group"><label>セット</label><input type="number" id="modal-ex-sets" value="3" inputmode="numeric"></div>
    </div>
    <div class="modal-btn-row">
      <button class="modal-btn cancel" onclick="closeModal('modal-ex')">キャンセル</button>
      <button class="modal-btn confirm" onclick="confirmAddExercise()">追加する</button>
    </div>
  </div>
</div>

<!-- ADD TAB MODAL -->
<div class="modal-overlay" id="modal-tab">
  <div class="modal">
    <div class="modal-title">新しいメニューを追加</div>
    <input class="modal-input" id="modal-tab-name" placeholder="メニュー名（例：肩特化）" type="text">
    <input class="modal-input" id="modal-tab-sub" placeholder="サブタイトル（例：肩・腕 / 30分）" type="text">
    <div class="modal-btn-row">
      <button class="modal-btn cancel" onclick="closeModal('modal-tab')">キャンセル</button>
      <button class="modal-btn confirm" onclick="confirmAddTab()">追加する</button>
    </div>
  </div>
</div>

<!-- RENAME TAB MODAL -->
<div class="modal-overlay" id="modal-rename">
  <div class="modal">
    <div class="modal-title">名前を変更</div>
    <input class="modal-input" id="modal-rename-name" placeholder="新しいメニュー名" type="text">
    <input class="modal-input" id="modal-rename-sub" placeholder="サブタイトル（例：胸・肩 / 60分）" type="text">
    <div class="modal-btn-row">
      <button class="modal-btn cancel" onclick="closeModal('modal-rename')">キャンセル</button>
      <button class="modal-btn confirm" onclick="confirmRename()">変更する</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">削除しますか？</div>
    <div class="confirm-sub" id="confirm-sub">この操作は取り消せません</div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-btn danger" onclick="executeConfirm()">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKGo9xRwQQGQ9mkyfIgvB-zbLA611w-wZ6pgKBJAl0W35nwdoV136EJHV5ZiwAL7gr/exec';

// DEFAULT DATA
const DEFAULT_TABS = [
  { id: 'PUSH', name: 'PUSH', sub: '胸・肩・三頭筋 / 60分', core: true },
  { id: 'PULL', name: 'PULL', sub: '背中・二頭筋 / 60分', core: true },
  { id: 'LEGS', name: 'LEGS', sub: '脚・体幹 / 60分', core: true },
  { id: '火曜', name: '火曜', sub: '肩・腕特化 / 30分', core: false },
  { id: '木曜', name: '木曜', sub: '胸・背中特化 / 30分', core: false },
];

const DEFAULT_MENUS = {
  PUSH: [
    { name: 'ベンチプレス', target: '62.5kg × 8回 × 3セット', defaultKg: 62.5, defaultReps: 8, defaultSets: 3 },
    { name: 'インクラインダンベルプレス', target: '20kg × 10回 × 3セット', defaultKg: 20, defaultReps: 10, defaultSets: 3 },
    { name: 'サイドレイズ', target: '9kg × 12回 × 3セット', defaultKg: 9, defaultReps: 12, defaultSets: 3 },
    { name: 'プッシュダウン', target: '25kg × 10回 × 3セット', defaultKg: 25, defaultReps: 10, defaultSets: 3 },
  ],
  PULL: [
    { name: 'ラットプルダウン', target: '57kg × 8回 × 3セット', defaultKg: 57, defaultReps: 8, defaultSets: 3 },
    { name: 'ダンベルロー', target: '18kg × 10回 × 3セット', defaultKg: 18, defaultReps: 10, defaultSets: 3 },
    { name: 'フェイスプル', target: '23kg × 12回 × 3セット', defaultKg: 23, defaultReps: 12, defaultSets: 3 },
    { name: 'プリーチャーカール', target: '18kg × 10回 × 3セット', defaultKg: 18, defaultReps: 10, defaultSets: 3 },
  ],
  LEGS: [
    { name: 'スクワット', target: '130kg × 8回 × 3セット', defaultKg: 130, defaultReps: 8, defaultSets: 3 },
    { name: 'ルーマニアンデッドリフト', target: '70kg × 10回 × 3セット', defaultKg: 70, defaultReps: 10, defaultSets: 3 },
    { name: 'レッグカール', target: '45kg × 10回 × 3セット', defaultKg: 45, defaultReps: 10, defaultSets: 3 },
    { name: 'カーフレイズ', target: '75kg × 15回 × 3セット', defaultKg: 75, defaultReps: 15, defaultSets: 3 },
  ],
  火曜: [
    { name: 'サイドレイズ', target: '6kg × 15回 × 4セット', defaultKg: 6, defaultReps: 15, defaultSets: 4 },
    { name: 'プリーチャーカール', target: '12kg × 15回 × 4セット', defaultKg: 12, defaultReps: 15, defaultSets: 4 },
  ],
  木曜: [
    { name: 'インクラインダンベルプレス', target: '14kg × 15回 × 4セット', defaultKg: 14, defaultReps: 15, defaultSets: 4 },
    { name: 'ダンベルロー', target: '12kg × 15回 × 4セット', defaultKg: 12, defaultReps: 15, defaultSets: 4 },
  ],
};

// STATE
let tabs = JSON.parse(localStorage.getItem('tabs_v3') || 'null') || JSON.parse(JSON.stringify(DEFAULT_TABS));
let menus = JSON.parse(localStorage.getItem('menus_v3') || 'null') || JSON.parse(JSON.stringify(DEFAULT_MENUS));
let workoutHistory = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
let kpiHistory = JSON.parse(localStorage.getItem('kpiHistory') || '[]');
let currentTab = tabs[0].id;
let currentFilter = 'ALL';
let modalExTargetTab = '';
let renameTargetTab = '';
let confirmCallback = null;

function save() {
  localStorage.setItem('tabs_v3', JSON.stringify(tabs));
  localStorage.setItem('menus_v3', JSON.stringify(menus));
}

// ── RENDER ALL ──
function renderAll() {
  renderTabs();
  renderSections();
  renderHistoryFilters();
  renderKPIStats();
  renderKPIHistory();
  renderHistory();
}

function renderTabs() {
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = tabs.map(t => `
    <button class="tab ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.name}</button>
  `).join('') +
  `<button class="tab ${currentTab === 'kpi' ? 'active kpi-tab' : ''}" onclick="switchTab('kpi')">KPI</button>` +
  `<button class="tab ${currentTab === 'history' ? 'active history-tab' : ''}" onclick="switchTab('history')">履歴</button>` +
  `<button class="add-tab-btn" onclick="openModal('modal-tab')" title="メニュー追加">＋</button>`;
}

function renderSections() {
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = tabs.map(t => `
    <div class="section ${t.id === currentTab ? 'active' : ''}" id="section-${CSS.escape(t.id)}">
      <div class="day-header">
        <div class="day-header-left">
          <div class="day-title-wrap">
            <div class="day-title">${t.name}</div>
            <button class="edit-name-btn" onclick="openRename('${t.id}')">✏️</button>
          </div>
          <div class="day-sub">${t.sub || ''}</div>
        </div>
        <div class="day-header-right">
          <button class="icon-btn" onclick="openAddExercise('${t.id}')">＋ 種目追加</button>
          <button class="icon-btn danger" onclick="confirmDeleteTab('${t.id}')">タブ削除</button>
        </div>
      </div>
      <div id="exercises-${t.id}"></div>
      ${t.core ? `
      <div class="core-section">
        <div class="core-title">CORE（必須）</div>
        <div class="core-item"><span>デッドバグ</span><span>10回 × 3セット</span></div>
        <div class="core-item"><span>ヒップリフト</span><span>15回 × 3セット</span></div>
      </div>` : ''}
      <button class="save-btn" id="save-${t.id}" onclick="saveWorkout('${t.id}')">SAVE ${t.name} SESSION</button>
    </div>
  `).join('');

  tabs.forEach(t => renderExercises(t.id));
}

function renderExercises(tabId) {
  const container = document.getElementById(`exercises-${tabId}`);
  if (!container) return;
  const exList = menus[tabId] || [];
  if (exList.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--text2);font-size:13px;padding:20px 0;">種目がありません。「＋ 種目追加」で追加してください。</div>`;
    return;
  }
  container.innerHTML = exList.map((ex, i) => `
    <div class="exercise-card">
      <div class="exercise-top">
        <div class="exercise-name-wrap">
          <div class="exercise-order">0${i+1}</div>
          <div class="exercise-name">${ex.name}</div>
        </div>
        <button class="del-ex-btn" onclick="deleteExercise('${tabId}', ${i})">✕</button>
      </div>
      <div class="exercise-target">目標: ${ex.target || '—'}</div>
      <div class="exercise-inputs">
        <div class="input-group"><label>重量 kg</label><input type="number" id="${tabId}-${i}-kg" value="${ex.defaultKg}" step="0.5" inputmode="decimal"></div>
        <div class="input-group"><label>回数</label><input type="number" id="${tabId}-${i}-reps" value="${ex.defaultReps}" inputmode="numeric"></div>
        <div class="input-group"><label>セット</label><input type="number" id="${tabId}-${i}-sets" value="${ex.defaultSets}" inputmode="numeric"></div>
      </div>
    </div>
  `).join('');
}

function renderHistoryFilters() {
  const wrap = document.getElementById('history-filter-wrap');
  wrap.innerHTML = `<button class="filter-btn ${currentFilter==='ALL'?'active':''}" onclick="filterHistory('ALL',this)">ALL</button>` +
    tabs.map(t => `<button class="filter-btn ${currentFilter===t.id?'active':''}" onclick="filterHistory('${t.id}',this)">${t.name}</button>`).join('') +
    `<button class="filter-btn ${currentFilter==='KPI'?'active':''}" onclick="filterHistory('KPI',this)">KPI</button>`;
}

// ── TAB MANAGEMENT ──
function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById(`section-${id}`);
  if (sec) sec.classList.add('active');
  renderTabs();
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function confirmAddTab() {
  const name = document.getElementById('modal-tab-name').value.trim();
  const sub = document.getElementById('modal-tab-sub').value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  const id = 'tab_' + Date.now();
  tabs.push({ id, name, sub, core: false });
  menus[id] = [];
  save();
  closeModal('modal-tab');
  renderAll();
  switchTab(id);
  showToast(`「${name}」を追加しました`);
}

function confirmDeleteTab(tabId) {
  const tab = tabs.find(t => t.id === tabId);
  confirmCallback = () => {
    tabs = tabs.filter(t => t.id !== tabId);
    delete menus[tabId];
    save();
    currentTab = tabs.length > 0 ? tabs[0].id : 'kpi';
    renderAll();
    switchTab(currentTab);
    showToast('メニューを削除しました');
  };
  document.getElementById('confirm-title').textContent = `「${tab.name}」を削除しますか？`;
  document.getElementById('confirm-sub').textContent = '種目データも全て削除されます';
  document.getElementById('confirm-overlay').classList.add('active');
}

// ── RENAME ──
function openRename(tabId) {
  renameTargetTab = tabId;
  const tab = tabs.find(t => t.id === tabId);
  document.getElementById('modal-rename-name').value = tab.name;
  document.getElementById('modal-rename-sub').value = tab.sub || '';
  openModal('modal-rename');
}

function confirmRename() {
  const name = document.getElementById('modal-rename-name').value.trim();
  const sub = document.getElementById('modal-rename-sub').value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  const tab = tabs.find(t => t.id === renameTargetTab);
  tab.name = name;
  tab.sub = sub;
  save();
  closeModal('modal-rename');
  renderAll();
  showToast('名前を変更しました');
}

// ── EXERCISE MANAGEMENT ──
function openAddExercise(tabId) {
  modalExTargetTab = tabId;
  document.getElementById('modal-ex-name').value = '';
  document.getElementById('modal-ex-target').value = '';
  document.getElementById('modal-ex-kg').value = 10;
  document.getElementById('modal-ex-reps').value = 10;
  document.getElementById('modal-ex-sets').value = 3;
  openModal('modal-ex');
}

function confirmAddExercise() {
  const name = document.getElementById('modal-ex-name').value.trim();
  if (!name) { showToast('種目名を入力してください'); return; }
  if (!menus[modalExTargetTab]) menus[modalExTargetTab] = [];
  menus[modalExTargetTab].push({
    name,
    target: document.getElementById('modal-ex-target').value.trim(),
    defaultKg: parseFloat(document.getElementById('modal-ex-kg').value) || 10,
    defaultReps: parseInt(document.getElementById('modal-ex-reps').value) || 10,
    defaultSets: parseInt(document.getElementById('modal-ex-sets').value) || 3,
  });
  save();
  renderExercises(modalExTargetTab);
  closeModal('modal-ex');
  showToast(`${name}を追加しました`);
}

function deleteExercise(tabId, index) {
  menus[tabId].splice(index, 1);
  save();
  renderExercises(tabId);
  showToast('種目を削除しました');
}

// ── SAVE WORKOUT ──
async function saveWorkout(tabId) {
  const tab = tabs.find(t => t.id === tabId);
  const exList = menus[tabId] || [];
  const exercises = exList.map((ex, i) => ({
    name: ex.name,
    kg: parseFloat(document.getElementById(`${tabId}-${i}-kg`).value) || 0,
    reps: parseInt(document.getElementById(`${tabId}-${i}-reps`).value) || 0,
    sets: parseInt(document.getElementById(`${tabId}-${i}-sets`).value) || 0,
  }));
  const entry = { id: Date.now(), type: tab.name, date: new Date().toISOString(), exercises };
  workoutHistory.unshift(entry);
  localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));
  renderHistory();
  renderHistoryFilters();

  const btn = document.getElementById(`save-${tabId}`);
  if (btn) btn.disabled = true;
  setSyncStatus('syncing');
  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: tab.name, exercises }) });
    setSyncStatus('ok');
    showToast(`${tab.name}を記録しました！`);
  } catch(e) {
    setSyncStatus('error');
    showToast('ローカル保存済み（クラウド失敗）');
  }
  if (btn) btn.disabled = false;
}

// ── KPI ──
async function saveKPI() {
  const weight = parseFloat(document.getElementById('input-weight').value);
  const waist = parseFloat(document.getElementById('input-waist').value);
  if (!weight && !waist) { showToast('数値を入力してください'); return; }
  const entry = { id: Date.now(), date: new Date().toISOString(), weight, waist };
  kpiHistory.unshift(entry);
  localStorage.setItem('kpiHistory', JSON.stringify(kpiHistory));
  document.getElementById('input-weight').value = '';
  document.getElementById('input-waist').value = '';
  renderKPIStats();
  renderKPIHistory();

  const btn = document.getElementById('save-kpi');
  btn.disabled = true;
  setSyncStatus('syncing');
  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'KPI', weight, waist }) });
    setSyncStatus('ok');
    showToast('KPIを記録しました！');
  } catch(e) {
    setSyncStatus('error');
    showToast('ローカル保存済み');
  }
  btn.disabled = false;
}

function renderKPIStats() {
  if (kpiHistory.length === 0) return;
  const latest = kpiHistory[0], prev = kpiHistory[1];
  if (latest.weight) {
    document.getElementById('current-weight').textContent = latest.weight;
    if (prev && prev.weight) {
      const diff = (latest.weight - prev.weight).toFixed(1);
      const el = document.getElementById('weight-change');
      el.textContent = (diff > 0 ? '+' : '') + diff + 'kg（先週比）';
      el.className = 'stat-change ' + (parseFloat(diff) <= 0 ? 'good' : 'bad');
    }
    const pct = Math.min(100, Math.max(0, ((72 - latest.weight) / 4) * 100));
    document.getElementById('weight-progress').style.width = pct + '%';
    document.getElementById('weight-progress-label').textContent = Math.round(pct) + '%';
  }
  if (latest.waist) {
    document.getElementById('current-waist').textContent = latest.waist;
    if (prev && prev.waist) {
      const diff = (latest.waist - prev.waist).toFixed(1);
      const el = document.getElementById('waist-change');
      el.textContent = (diff > 0 ? '+' : '') + diff + 'cm（先週比）';
      el.className = 'stat-change ' + (parseFloat(diff) <= 0 ? 'good' : 'bad');
    }
    const pct = Math.min(100, Math.max(0, ((89 - latest.waist) / 6) * 100));
    document.getElementById('waist-progress').style.width = pct + '%';
    document.getElementById('waist-progress-label').textContent = Math.round(pct) + '%';
  }
}

function renderKPIHistory() {
  const container = document.getElementById('kpi-history-list');
  if (kpiHistory.length === 0) { container.innerHTML = '<div class="history-empty">まだ記録がありません</div>'; return; }
  container.innerHTML = kpiHistory.slice(0, 10).map(e => `
    <div class="history-item">
      <div class="history-item-header">
        <div class="history-item-left"><div class="history-item-type">KPI</div><div class="history-item-date">${formatDate(e.date)}</div></div>
        <button class="del-record-btn" onclick="confirmDeleteRecord(${e.id},'KPI')">削除</button>
      </div>
      <div style="display:flex;gap:20px;font-size:13px;">
        ${e.weight ? `<span>体重: <strong style="color:var(--accent)">${e.weight}kg</strong></span>` : ''}
        ${e.waist ? `<span>ウエスト: <strong style="color:#5b8dd4">${e.waist}cm</strong></span>` : ''}
      </div>
    </div>
  `).join('');
}

function filterHistory(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-list');
  let list = currentFilter === 'ALL' ? workoutHistory :
    currentFilter === 'KPI' ? kpiHistory :
    workoutHistory.filter(h => h.type === currentFilter || h.type === tabs.find(t=>t.id===currentFilter)?.name);
  if (list.length === 0) { container.innerHTML = '<div class="history-empty">まだ記録がありません</div>'; return; }
  container.innerHTML = list.slice(0, 30).map(e => {
    if (e.weight !== undefined || e.waist !== undefined) {
      return `<div class="history-item">
        <div class="history-item-header">
          <div class="history-item-left"><div class="history-item-type">KPI</div><div class="history-item-date">${formatDate(e.date)}</div></div>
          <button class="del-record-btn" onclick="confirmDeleteRecord(${e.id},'KPI')">削除</button>
        </div>
        <div style="font-size:13px;display:flex;gap:16px;">
          ${e.weight ? `<span>体重: <strong style="color:var(--accent)">${e.weight}kg</strong></span>` : ''}
          ${e.waist ? `<span>ウエスト: <strong style="color:#5b8dd4">${e.waist}cm</strong></span>` : ''}
        </div>
      </div>`;
    }
    return `<div class="history-item">
      <div class="history-item-header">
        <div class="history-item-left"><div class="history-item-type">${e.type}</div><div class="history-item-date">${formatDate(e.date)}</div></div>
        <button class="del-record-btn" onclick="confirmDeleteRecord(${e.id},'workout')">削除</button>
      </div>
      ${(e.exercises||[]).map(ex=>`
        <div class="history-exercise">
          <span class="history-exercise-name">${ex.name}</span>
          <span class="history-exercise-weight">${ex.kg}kg × ${ex.reps}回 × ${ex.sets}</span>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// ── DELETE RECORD ──
let deleteRecordId = null, deleteRecordType = null;
function confirmDeleteRecord(id, type) {
  deleteRecordId = id; deleteRecordType = type;
  confirmCallback = () => {
    if (deleteRecordType === 'KPI') {
      kpiHistory = kpiHistory.filter(h => h.id !== deleteRecordId);
      localStorage.setItem('kpiHistory', JSON.stringify(kpiHistory));
      renderKPIStats(); renderKPIHistory();
    } else {
      workoutHistory = workoutHistory.filter(h => h.id !== deleteRecordId);
      localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));
    }
    renderHistory();
    showToast('記録を削除しました');
  };
  document.getElementById('confirm-title').textContent = '記録を削除しますか？';
  document.getElementById('confirm-sub').textContent = 'この操作は取り消せません';
  document.getElementById('confirm-overlay').classList.add('active');
}

function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('active'); confirmCallback = null; }
function executeConfirm() { closeConfirm(); if (confirmCallback) confirmCallback(); }

// ── UTILS ──
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot'), label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (status === 'syncing') { dot.classList.add('syncing'); label.textContent = '同期中...'; }
  else if (status === 'ok') { label.textContent = 'クラウド保存済み'; }
  else { dot.classList.add('error'); label.textContent = '同期エラー'; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit' });
}

// Close modals on overlay click
['modal-ex','modal-tab','modal-rename'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target===this) closeModal(id); });
});

renderAll();
</script>
</body>
</html>
